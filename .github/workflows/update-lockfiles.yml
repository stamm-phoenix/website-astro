name: Update lockfiles
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-lockfiles:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v11
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.x
      - name: Update flake lockfile
        run: nix flake update
      - name: Update Bun lockfile
        run: bun install
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update lockfiles [skip ci]"
          branch: main
          file_pattern: |
            flake.lock
            bun.lock
